<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        /* ओळ छोटी आणि एकाच लाईनमध्ये ठेवण्यासाठी */
        .top-line { text-align: center; font-weight: bold; padding: 5px; text-transform: uppercase; font-size: 14px; white-space: nowrap; }
        .flag { text-align: center; padding-bottom: 5px; }
        
        .header { background-color: blue; color: white; padding: 15px; text-align: center; }
        
        #chatBox { height: 300px; overflow-y: auto; padding: 15px; border: 1px solid #ccc; margin: 10px; }
        
        .name-matika { color: blue; font-weight: bold; }
        .name-soul { color: darkorange; font-weight: bold; }
        .msg-black { color: #000; }
        .listening-green { color: green; font-weight: bold; }

        .btn-container { display: flex; justify-content: space-evenly; padding: 10px; position: fixed; bottom: 20px; width: 100%; }
        .btn { padding: 15px 25px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        
        .btn-talk { background-color: red; }    
        .btn-send { background-color: purple; } 
        .btn-login { background-color: green; } 
    </style>
</head>
<body>

    <div class="top-line">DESIGNED & DEVELOPED IN INDIA</div>
    <div class="flag">🇮🇳</div>

    <div class="header">
        <h2 style="margin: 0; color: white;">VILAS TALKS</h2>
        <div>Assistant: Matika | Ver 7.0</div>
    </div>

    <div id="chatBox">
        <div class="name-matika">Matika: <span class="msg-black">Welcome to VILAS TALKS. मी मतिका. मी आपली मदत करू का? Tap the red button and speak.</span></div>
        <div class="listening-green">Matika: 🎧 Listening...</div>
        <div class="name-soul">Great Soul:</div>
    </div>

    <div class="btn-container">
        <button class="btn btn-talk">TALK</button>
        <button class="btn btn-send">SEND</button>
        <button class="btn btn-login">LOGIN</button>
    </div>

</body>
</html>
